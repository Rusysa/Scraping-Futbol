name: Scraper Futbol Telegram

on:
  schedule:
    # Se ejecuta los lunes a las 18:00 CDMX (00:00 UTC del martes)
    - cron: "0 0 * * 2"
    # Se ejecuta los jueves a las 18:00 CDMX (00:00 UTC del viernes)
    - cron: "0 0 * * 5"
  workflow_dispatch: # Permite ejecutar el script manualmente desde GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar pnpm
        # pnpm/action-setup@v4 lee la versión automáticamente del campo
        # "packageManager": "pnpm@10.32.1" en package.json. No se especifica
        # "version" aqui para evitar el error "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4

      - name: Instalar dependencias
        # --frozen-lockfile asegura que en CI se usen exactamente las versiones del lockfile
        run: pnpm install --frozen-lockfile

      - name: Ejecutar Scraper y Enviar por Telegram
        # Secrets necesarios (Settings -> Secrets and variables -> Actions):
        #   TELEGRAM_BOT_TOKEN : token del bot obtenido desde @BotFather en Telegram
        #   TELEGRAM_CHAT_ID   : ID del chat o grupo destino
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/action.js
